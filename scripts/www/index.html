<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>刷题软件</title>
<style>
* { box-sizing: border-box; }
body { font-family: "Microsoft YaHei", sans-serif; background-color: #f4f6f9; margin: 0; padding: 10px; color: #333; font-size: 14px; line-height: 1.4; }
.container { max-width: 100%; margin: 0 auto; background: white; padding: 15px; border-radius: 8px; box-shadow: 0 0 10px rgba(0,0,0,0.1); display: flex; flex-direction: column; }
.header { text-align: center; color: #2c3e50; margin-bottom: 15px; }
.header h1 { font-size: 1.5em; margin: 0; }
.main-content { display: flex; flex-direction: column; gap: 15px; }
.sidebar { width: 100%; background: #f8f9fa; border-radius: 5px; padding: 15px; display: flex; gap: 15px; flex-direction: column; }
.question-section { flex: 1; min-height: 200px; }
.section-title { margin-top: 0; font-size: 1.1em; color: #2c3e50; margin-bottom: 10px; }
.quiz-main { flex: 1; display: flex; flex-direction: column; }
.upload-area { text-align: center; padding: 20px; border: 2px dashed #3498db; border-radius: 10px; margin-bottom: 20px; }
.upload-area:hover { border-color: #2980b9; }
.btn { background-color: #3498db; color: white; padding: 10px 15px; border: none; border-radius: 5px; cursor: pointer; font-size: 14px; margin-right: 8px; min-height: 40px; display: inline-flex; align-items: center; justify-content: center; }
.btn:hover { background-color: #2980b9; }
.btn:active { transform: scale(0.98); }
.btn-secondary { background-color: #95a5a6; }
.btn-success { background-color: #2ecc71; }
.btn-warning { background-color: #f39c12; }
.btn-danger { background-color: #e74c3c; }
.btn-purple { background-color: #9b59b6; }
.quiz-container { display: none; }
.question-info { margin-bottom: 15px; text-align: center; }
.question-info h3 { font-size: 1.1em; margin: 0; }
.question-box { margin-bottom: 15px; padding: 15px; border: 1px solid #eee; border-radius: 5px; background: #fdfdfd; flex: 1; position: relative; }
.question-box h4 { font-size: 1em; margin-top: 0; margin-bottom: 10px; }
.question-box p { margin: 0 0 15px 0; word-wrap: break-word; }
.options { margin-left: 0; }
.option { margin: 8px 0; }
.option-btn { display: block; width: 100%; padding: 12px; margin: 8px 0; border: 2px solid #ddd; border-radius: 8px; background-color: #fff; cursor: pointer; text-align: left; transition: all 0.2s ease; font-size: inherit; min-height: 44px; display: flex; align-items: center; }
.option-btn:hover { border-color: #3498db; background-color: #f8f9fa; }
.option-btn.selected { border-color: #3498db; background-color: #e1f0fa; }
.option-btn.correct { border-color: #27ae60; background-color: #d4edda; }
.option-btn.incorrect { border-color: #e74c3c; background-color: #f8d7da; }
.result { font-weight: bold; margin-top: 10px; padding: 10px; border-radius: 5px; margin-bottom: 15px; text-align: center; }
.correct { background-color: #d4edda; color: #155724; }
.wrong { background-color: #f8d7da; color: #721c24; }
.answer-display { background-color: #e8f4fd; padding: 12px; border-radius: 5px; margin-top: 15px; font-size: 0.9em; }
.explanation { background-color: #f9f9f9; padding: 12px; border-left: 4px solid #3498db; margin-top: 15px; font-size: 0.9em; line-height: 1.5; }
.status-bar { background-color: #ecf0f1; padding: 10px; border-radius: 5px; margin-top: 15px; font-size: 0.9em; text-align: center; }
.progress-container { margin-top: 15px; }
.progress-bar { width: 100%; height: 15px; background-color: #e0e0e0; border-radius: 8px; overflow: hidden; }
.progress-fill { height: 100%; background-color: #3498db; transition: width 0.3s ease; }
.progress-text { text-align: right; margin-top: 5px; font-size: 12px; color: #666; }
.switch-library-btn { margin-bottom: 15px; background-color: #9b59b6; }
.switch-library-btn:hover { background-color: #8e44ad; }
.extra-controls { display: flex; flex-wrap: wrap; gap: 10px; margin-top: 15px; justify-content: center; }
.modal { display: none; position: fixed; z-index: 1000; left: 0; top: 0; width: 100%; height: 100%; background-color: rgba(0,0,0,0.5); }
.modal-content { background-color: #fefefe; margin: 5% auto; padding: 20px; border: 1px solid #888; border-radius: 8px; width: 80%; max-width: 600px; max-height: 80vh; overflow-y: auto; }
.close { color: #aaa; float: right; font-size: 28px; font-weight: bold; cursor: pointer; }
.close:hover { color: black; }
.list-container { margin-top: 20px; }
.list-section { margin-bottom: 20px; }
.list-section h3 { margin-top: 0; color: #2c3e50; }
.list-items { display: grid; grid-template-columns: repeat(10, 1fr); gap: 10px; }
.list-item { padding: 8px; background-color: #f8f9fa; border-radius: 5px; text-align: center; cursor: pointer; transition: background-color 0.2s; }
.list-item:hover { background-color: #e9ecef; }
.list-item.answered { background-color: #d4edda; color: #155724; }
.list-item.mistake { background-color: #f8d7da; color: #721c24; }
.list-item.current { border: 2px solid #3498db; }
.font-size-control { width: 80%; margin: 10px auto 20px; padding: 10px; background-color: white; border-radius: 5px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
.font-size-label { display: flex; justify-content: space-between; margin-bottom: 8px; font-size: 14px; color: #333; }
.font-size-slider { width: 100%; height: 8px; -webkit-appearance: none; background: #ccc; border-radius: 4px; outline: none; }
.font-size-slider::-webkit-slider-thumb { -webkit-appearance: none; width: 20px; height: 20px; border-radius: 50%; background: #3498db; cursor: pointer; }
.font-size-slider::-moz-range-thumb { width: 20px; height: 20px; border-radius: 50%; background: #3498db; cursor: pointer; border: none; }
.swipe-hint { position: absolute; bottom: 10px; right: 10px; font-size: 12px; color: #999; opacity: 0.7; }
.hidden { display: none !important; }
@media screen and (max-width: 768px) {
body { padding: 5px; }
.container { padding: 10px; }
.upload-area { padding: 15px; }
.btn { padding: 8px 12px; font-size: 13px; margin: 4px; }
.nav-buttons .btn { min-width: 80px; padding: 10px 15px; }
.sidebar { flex-direction: column; }
.question-section { flex: none; }
.list-items { grid-template-columns: repeat(5, 1fr); }
.question-box { padding: 12px; }
.option-btn { padding: 10px; font-size: 13px; }
.status-bar { font-size: 0.8em; padding: 8px; }
.progress-text { font-size: 11px; }
.extra-controls { flex-direction: column; align-items: center; }
.modal-content { width: 95%; margin: 10% auto; }
}
@media screen and (max-width: 480px) {
.list-items { grid-template-columns: repeat(3, 1fr); }
}
</style>
</head>
<body>
<div class="container">
<div class="header">
<h1>📚 刷题</h1>
</div>

<div class="font-size-control">
<div class="font-size-label">
<span>字体大小</span>
<span id="fontSizeValue">14px</span>
</div>
<input type="range" min="10" max="30" value="14" class="font-size-slider" id="fontSizeSlider">
</div>

<div class="main-content">
<div class="sidebar" id="sidebar" style="display: none;">
<button class="btn switch-library-btn" id="switchLibraryBtn">🔄 更换题库</button>
</div>

<div class="quiz-main">
<div class="quiz-container" id="quizContainer">
<div class="question-info">
<h3>第 <span id="currentNum">1</span> 题 / 共 <span id="totalNum">0</span> 题</h3>
</div>
<div class="question-box" id="questionBox">
<div class="swipe-hint">← → 滑动切换题目</div>
</div>
<div id="resultMessage" class="result hidden"></div>
<div id="answerDisplay" class="answer-display hidden"></div>
<div id="explanation" class="explanation hidden"></div>
<div class="nav-buttons">
<button class="btn btn-warning" id="prevBtn" style="display: none;">⬅️ 上一题</button>
<button class="btn btn-success" id="nextBtn" style="display: none;">➡️ 下一题</button>
</div>
<div class="progress-container">
<div class="progress-bar">
<div class="progress-fill" id="progressFill" style="width: 0%;"></div>
</div>
<div class="progress-text" id="progressText">0% (0/0)</div>
</div>
<div class="status-bar" id="statusBar">
已答: <span id="answeredCount">0</span> / <span id="totalCount">0</span> 题 | 错题: <span id="mistakeCount">0</span> 题
</div>
<div class="extra-controls">
<button class="btn btn-purple" id="showListsBtn">📋 查看列表</button>
<button class="btn btn-warning" id="randomBtn">🎲 随机练习</button>
<button class="btn btn-danger" id="mistakePracticeBtn">❌ 错题练习</button>
<button class="btn btn-secondary" id="memorizeBtn">📖 背题模式</button>
</div>
</div>
</div>
</div>
</div>

<div id="listsModal" class="modal">
<div class="modal-content">
<span class="close">&times;</span>
<h2>题库列表</h2>
<div class="list-container">
<div class="list-section">
<h3>✅ 已答题目</h3>
<div class="list-items" id="answeredItems"></div>
</div>
<div class="list-section">
<h3>❌ 错题集</h3>
<div class="list-items" id="mistakeItems"></div>
</div>
<div class="list-section">
<h3>❓ 未答题</h3>
<div class="list-items" id="unansweredItems"></div>
</div>
</div>
</div>
</div>

<script>
let questions = [];
let currentQuestionIndex = 0;
let answeredQuestions = new Set();
let mistakeQuestions = new Set();
let memorizeMode = false;
let randomMode = false;
let randomOrder = [];
let currentOrder = [];

document.addEventListener('DOMContentLoaded', function() {
const fontSizeSlider = document.getElementById('fontSizeSlider');
const fontSizeValue = document.getElementById('fontSizeValue');

fontSizeSlider.addEventListener('input', function() {
const size = this.value + 'px';
document.body.style.fontSize = size;
fontSizeValue.textContent = size;
});

const embeddedQuestions = [
    {
        "id": 1,
        "question": "流行性腮腺炎伴发睾丸炎的临床特征是",
        "options": {
            "A": "睾丸炎多发生在小于10岁男孩",
            "B": "肿大睾丸多为双侧",
            "C": "半数病例可发生睾丸萎缩",
            "D": "睾丸炎后多数会影响生育",
            "E": "睾丸肿大时往往伴有下腹疼痛，一般没有发热及寒战"
        },
        "answer": "C",
        "explanation": "</think>\n\n- **正确答案**：C  \n- **核心考点**：流行性腮腺炎伴发睾丸炎的临床特征与并发症。\n\n- **详细解析**：  \n  **C. 半数病例可发生睾丸萎缩**：这是正确答案。流行性腮腺炎（mumps）是由腮腺炎病毒引起的急性传染病，当感染发生在青春期前的男孩中，病毒可侵犯睾丸，导致睾丸炎。睾丸炎后，约半数病例会发生睾丸萎缩，这是该病的一个重要并发症，因此选项C正确。\n\n  **A. 睾丸炎多发生在小于10岁男孩**：错误。睾丸炎通常发生在青春期前的男孩（如10岁左右），但并非“小于10岁”，而是“10岁左右”，因此该选项表述不准确。\n\n  **B. 肿大睾丸多为双侧**：错误。流行性腮腺炎伴发的睾丸炎多为单侧，而非双侧，因此该选项不符合实际情况。\n\n  **D. 睾丸炎后多数会影响生育**：错误。虽然睾丸炎可能导致睾丸萎缩，但并非“多数”会影响生育，多数情况下，只要及时治疗，生育功能仍可保留，因此该选项表述过于绝对。\n\n  **E. 睾丸肿大时往往伴有下腹疼痛，一般没有发热及寒战**：错误。流行性腮腺炎伴发睾丸炎时，通常伴有发热、寒战等全身症状，而下腹疼痛可能与睾丸炎有关，但并非“一般没有发热及寒战”，因此该选项错误。\n\n- **记忆技巧**：  \n  “腮腺炎伴睾丸炎，半数萎缩，记住‘半数’，其他选项都是干扰项，注意区分年龄、发病部位和并发症的常见表现。”"
    },
    {
        "id": 2,
        "question": "Addis计数的正常值为",
        "options": {
            "A": "红细胞<100万，白细胞<50万，管型<10000个",
            "B": "红细胞<50万，白细胞<100万，管型 <5000个",
            "C": "红细胞<100万，白细胞<50万，管型<5000个",
            "D": "红细胞<50万，白细胞<100 万，管型<10000个",
            "E": "红细胞<100万，白细胞<200万，管型<10000个"
        },
        "answer": "B",
        "explanation": "</think>\n\n- **正确答案**：B  \n- **核心考点**：Addis计数的正常参考值范围。  \n\n- **详细解析**：  \n  Addis计数是用于评估肾功能和尿路感染的尿液检查方法，主要检测尿液中红细胞、白细胞和管型的数量。根据《临床检验学》及相关医学资料，Addis计数的正常值为：  \n  - 红细胞 < 50 万/升  \n  - 白细胞 < 100 万/升  \n  - 管型 < 5000 个/24小时  \n\n  因此，选项 **B** 是正确的。  \n\n  其他选项分析如下：  \n  - **A**：红细胞<100万，白细胞<50万，管型<10000个 → 错误，红细胞和白细胞的数值与正常值不符。  \n  - **C**：红细胞<100万，白细胞<50万，管型<5000个 → 错误，红细胞和白细胞的数值与正常值不符。  \n  - **D**：红细胞<50万，白细胞<100万，管型<10000个 → 错误，管型数值超过正常值。  \n  - **E**：红细胞<100万，白细胞<200万，管型<1000ity个 → 错误，红细胞和白细胞的数值均超过正常值。  \n\n- **记忆技巧**：  \n  “红白管”口诀：**红50，白100，管5000**，即“红细胞50万，白细胞100万，管型5000个”，对应选项 **B**。"
    },
    {
        "id": 3,
        "question": "哪一项是急性小脑共济失调常见的体征",
        "options": {
            "A": "肌张力增高",
            "B": "膝反射亢进",
            "C": "闭目难立征阳性",
            "D": "眼球外展受限",
            "E": "咽反射减弱或消失"
        },
        "answer": "C",
        "explanation": "</think>\n\n- **正确答案**：C  \n- **核心考点**：急性小脑共济失调的典型体征是闭目难立征阳性。  \n\n- **详细解析**：  \n  **C. 闭目难立征阳性**：急性小脑共济失调（如小脑炎、小脑梗死等）常表现为小脑功能障碍，导致平衡和协调能力下降。闭目难立征（指闭目后难以站立）是小脑病变的典型体征，因患者无法依靠视觉辅助来维持平衡，故闭目后难以站立。该体征在小脑病变时阳性率较高，是诊断小脑功能障碍的重要依据。  \n\n  **A. 肌张力增高**：肌张力增高常见于上运动神经元病变（如脑梗死、脑出血、帕金森病等），而非小脑病变。小脑病变通常表现为肌张力减低或正常。  \n\n  **B. 膝反射亢进**：膝反射亢进多见于上运动神经元损伤（如脊髓病变、脑干病变），与小脑病变无关。  \n\n  **D. 眼球外展受限**：眼球外展受限常见于脑干病变（如脑干肿瘤、脑干梗死），与小脑病变无关。  \n\n  **E. 咽反射减弱或消失**：咽反射减弱或消失多见于脑干病变（如延髓病变），与小脑病变无关。  \n\n- **记忆技巧**：  \n  “小脑共济失调，闭目难立征阳性，是关键体征，其他如肌张力增高、膝反射亢进、眼球外展受限、咽反射异常，多与上运动神经元或脑干病变相关，应区分记忆。”"
    },
    {
        "id": 4,
        "question": "男，9岁，发热、贫血，全身浅表淋巴结及肝脾肿大。为明确诊断，最主要的检查是()",
        "options": {
            "A": "X线检查",
            "B": "骨髓检查",
            "C": "腹部B超",
            "D": "腹部CT",
            "E": "肝穿"
        },
        "answer": "B",
        "explanation": "</think>\n\n**正确答案**：B\n\n**核心考点**：骨髓检查是诊断血液系统疾病（如白血病、淋巴瘤等）的首选和关键检查方法。\n\n**详细解析**：\n\n- **B. 骨髓检查**：本题患者表现为发热、贫血、全身浅表淋巴结及肝脾肿大，这些症状提示可能为血液系统恶性肿瘤，如急性白血病或淋巴瘤。骨髓检查是诊断这类疾病的主要手段，能够直接观察骨髓细胞形态、增生活跃度及是否存在异常细胞，是确诊的“金标准”。\n\n- **A. X线检查**：X线主要用于观察骨骼系统病变，如骨折、骨质疏松等，对血液系统疾病诊断价值有限。\n\n- **C. 腹部B超**：可评估肝脾肿大、腹腔内肿块等，但不能明确病因，不能替代骨髓检查。\n\n- **D. 腹部CT**：可显示腹部器官的形态和结构，有助于发现肿大器官或占位性病变，但不能直接诊断血液系统疾病。\n\n- **E. 肝穿**：肝穿刺主要用于肝脏疾病的诊断，如肝炎、肝硬化等，对血液系统疾病诊断意义不大。\n\n**记忆技巧**：  \n“骨髓检查是血液病的‘金标准’，记住‘骨髓’是诊断血液系统疾病的关键，其他检查是辅助。”  \n或：  \n“血液病看骨髓，肝脾肿大别慌，骨髓检查是关键。”"
    },
    {
        "id": 5,
        "question": "口服补液盐所含葡萄糖的适宜浓度及主要作用为下列哪项()",
        "options": {
            "A": "5％，使液体具有一定渗透压",
            "B": "2％，使液体具有一定渗透压",
            "C": "2％，增加小肠对水钠的重吸收",
            "D": "10％，补充一定热量",
            "E": "10％，增加小肠对水、钠的重吸收"

        "answer": "A",
        "explanation": "</think>\n\n**正确答案**：A  \n**核心考点**：本题考查医学伦理中“医疗保密原则”的基本内容，特别是“为病人保密”与“对病人保密”两个方面的区分。\n\n**详细解析**：  \n**A. 为病人保密与对病人保密**  \n这是正确的答案。在医学伦理中，“医疗保密原则”要求医务人员对病人的隐私信息进行保密，包括为病人保密（即不向他人泄露病人的病情、诊断结果、治疗情况等），以及对病人保密（即不向病人泄露其隐私信息，如病情的严重性、治疗风险等）。这两者共同构成了医疗保密的两个方面，是医学伦理中基本的道德要求。\n\n**B. 为病人家属保密与对病人家属保密**  \n此选项错误，因为医疗保密原则的核心是“为病人保密”，而不是为病人家属保密。虽然在某些情况下，医生可能需要向病人家属说明病情，但这是在病人知情同意或授权的情况下进行的，不属于“为病人保密”的范畴。\n\n**C. 为病人家属保密与对病人保密**  \n此选项错误，因为它混淆了“为病人家属保密”与“为病人保密”的概念。医疗保密原则的主体是病人，而不是病人家属，因此“为病人家属保密”并非医疗保密原则的直接内容。\n\n**D. 为病人家属保密与对病人家属保密**  \n此选项错误，与C类似，混淆了保密对象，且不符合医学伦理中对病人保密的基本原则。\n\n**E. 为医院保密与对同事保密**  \n此选项错误，因为“为医院保密”和“对同事保密”不属于医疗保密原则的核心内容，而是与医院管理、职业伦理相关，与病人隐私保护无直接关系。\n\n**记忆技巧**：  \n“为病人保密，对病人保密”——可简记为“为病人，对病人”，即“为”与“对”分别对应病人与病人，强调保密的两个方面：不泄露病人信息给他人（为病人保密），以及不向病人泄露隐私信息（对病人保密）。"

        "explanation": "</think>\n\n**正确答案**：E  \n**核心考点**：坏死性小肠结肠炎（NEC）的常见病因及临床相关因素。\n\n**详细解析**：  \n**E. 新生儿肺透明膜病**：不是坏死性小肠结肠炎的发病原因。肺透明膜病是由于肺泡表面活性物质不足引起的呼吸窘迫综合征，与NEC无直接因果关系。NEC主要发生在早产儿中，与肠道缺血、缺氧、感染、喂养方式等因素有关。\n\n**A. 窒息、缺氧、呼吸窘迫及休克等导致的肠道缺血、缺氧**：这是NEC的常见诱因之一。肠道缺血缺氧可导致肠黏膜损伤，进而引发炎症和坏死。\n\n**B. 高渗奶方的人工喂养，造成肠黏膜损伤**：高渗奶可导致肠道黏膜损伤，是NEC的常见诱因之一，尤其在早产儿中更为常见。\n\n**C. 肠道内感染**：肠道内感染可加重肠道炎症反应，是NEC的可能诱因之一，但并非主要病因。\n\n**D. 早产、低体温、脐动静脉插管**：这些是NEC的高危因素，与NEC的发生密切相关，尤其是早产儿、低体温和脐动静脉插管均可能引起肠道缺血或损伤。\n\n**记忆技巧**：  \n“NEC的诱因包括缺氧、高渗奶、早产、低体温、脐管，而肺透明膜病是呼吸系统问题，与NEC无关。”  \n口诀：**“缺氧、高渗、早产、低体温、脐管，肺透明膜病不相关。”**"

        "question": "大型室间隔缺损后期出现青紫时肺血管的改变是",

            "A": "肺血增多",
            "B": "肺血减少",

            "D": "动力型肺动脉高压",
            "E": "梗阻型肺动脉高压"
        },
        "answer": "E",
        "explanation": "</think>\n\n**正确答案**：E  \n**核心考点**：大型室间隔缺损（VSD）后期出现青紫时肺血管的改变属于梗阻型肺动脉高压。\n\n**详细解析**：  \n大型室间隔缺损是一种常见的先天性心脏病，其特点是左心室向右心室分流，导致肺血流量显著增加。在缺损早期，由于肺血流量增加，肺动脉压力升高，但尚未出现明显的肺血管阻力改变。随着病情进展，肺血管床因长期高血流而发生重塑，出现肺血管阻力增加，导致肺动脉压力进一步升高，最终出现右心衰竭和青紫（发绀）。此时，肺血管的改变属于**梗阻型肺动脉高压**，即由于肺血管阻力增加导致肺动脉压力升高，而非血流增加。\n\n- **A. 肺血增多**：错误。在VSD后期，肺血流量并非增多，而是因肺血管阻力增加而出现肺动脉高压，导致右心负担加重，肺血流量可能反而减少。\n- **B. 肺血减少**：错误。肺血减少通常发生在肺血管阻力显著增加的情况下，但VSD后期主要表现为肺血管阻力增加，而非血流减少。\n- **C. 肺动脉痉挛**：错误。肺动脉痉挛是肺动脉高压的早期表现，但VSD后期的肺动脉高压主要是由于肺血管阻力增加，而非单纯的痉挛。\n- **D. 动力型肺动脉高压**：错误。动力型肺动脉高压是由于肺血流量增加导致肺动脉压力升高，常见于VSD早期，而后期则转变为梗阻型肺动脉高压。\n\n**记忆技巧**：  \n“VSD后期青紫，肺动脉高压为**梗阻型**，可记为‘VSD→梗阻型肺动脉高压’，即‘VSD后肺压高，阻塞血管’。”"

        "explanation": "</think>\n\n**正确答案**：C\n\n**核心考点**：本题考查哮喘急性发作的严重程度判断及临床表现，特别是“哮喘持续状态”的诊断标准。\n\n**详细解析**：\n\n- **正确选项 C：哮喘持续状态**  \n  哮喘持续状态是指哮喘急性发作后，经过常规治疗（如吸入型β2受体激动剂、口服或局部糖皮质激素）仍无缓解，病情持续加重，出现明显的呼吸困难、呼吸肌疲劳、呼吸性呼吸音减弱或消失、三凹症、发绀、心音低钝等严重表现。本题中患者有长期哮喘病史，近期因感冒诱发病情加重，使用常规治疗无效，且出现呼吸困难、大汗淋漓、不能平卧、面色青灰、三凹症、心音低钝、双肺呼吸音降低、无哮鸣音等典型哮喘持续状态的表现，符合该诊断。\n\n- **错误选项 A：发生肺源性心脏病**  \n  肺源性心脏病多由长期肺部疾病（如慢性支气管炎、肺气肿）导致肺动脉高压引起，而本题患者虽有呼吸困难、发绀等表现，但无长期肺部疾病史，且无右心衰竭的典型表现（如下肢水肿、颈静脉怒张等），因此不能确诊为肺源性心脏病。\n\n- **错误选项 B：合并细菌性肺炎**  \n  细菌性肺炎通常伴有发热、咳黄痰、胸痛等感染症状，而本题患者无发热、痰液特征等感染证据，且肺部呼吸音降低、无哮鸣音，更符合哮喘持续状态的表现，而非细菌性肺炎。\n\n- **错误选项 D：使用β 受体激动剂类药物过量**  \n  β 受体激动剂过量可引起心悸、震颤、低钾等副作用，但不会导致呼吸困难、发绀、三凹症等严重呼吸衰竭表现，因此不符合本题临床表现。\n\n- **错误选项 E：水、电解质失衡**  \n  虽然严重哮喘发作可导致脱水、电解质紊乱，但本题患者的主要表现是呼吸系统症状，而非明显的水、电解质失衡，因此该选项不成立。\n\n**记忆技巧**：  \n“哮喘持续状态”可简记为“喘、咳、无哮鸣音、呼吸困难加重、治疗无效”，即“喘咳无鸣，呼吸困难，治疗无效”——“喘咳无鸣”对应无哮鸣音，“呼吸困难”对应三凹症、发绀等，而“治疗无效”是关键判断依据。"

        "explanation": "</think>\n\n- **正确答案**：A  \n- **核心考点**：百日咳杆菌培养的阳性率与疾病阶段密切相关，卡他期鼻咽部拭子培养阳性率最高。  \n\n- **详细解析**：  \n  百日咳是由百日咳杆菌（*Bordetella pertussis*）引起的急性呼吸道传染病，其病程分为三个阶段：卡他期、痉咳期和恢复期。  \n  - **A. 百日咳卡他期鼻咽部拭子培养**：在百日咳的卡他期（通常持续1-2周），患者症状以流涕、咳嗽、低热为主，此时百日咳杆菌在鼻咽部繁殖活跃，因此鼻咽部拭子培养阳性率最高，是诊断百日咳的重要方法。  \n  - **B. 百日咳痉咳期鼻咽部拭子培养**：痉咳期（通常持续2-6周）是咳嗽剧烈的阶段，此时细菌数量可能减少，因此培养阳性率下降。  \n  - **C. 百日咳卡他期痰液培养**：痰液培养的阳性率通常低于鼻咽部拭子培养，且痰液中细菌数量较少，不易检出。  \n  - **D. 百日咳痉咳期痰液培养**：痉咳期痰液培养阳性率更低，且痰液培养不如鼻咽拭子敏感。  \n  - **E. 百日咳恢复期痰液培养**：恢复期细菌已基本被清除，培养阳性率极低，几乎不用于诊断。  \n\n- **记忆技巧**：  \n  “**卡他期鼻拭子，阳性率最高**”，可简记为“**卡他鼻拭子最敏感**”，即“卡他期鼻咽部拭子培养阳性率最高”。"

        "explanation": "</think>\n\n**正确答案**：B. 严重联合免疫缺陷病\n\n**核心考点**：骨髓移植是治疗严重联合免疫缺陷病（SCID）的首选和最有效方法。\n\n**详细解析**：\n\n- **正确选项 B：严重联合免疫缺陷病**  \n  严重联合免疫缺陷病（Severe Combined Immunodeficiency, SCID）是一种先天性免疫缺陷疾病，主要表现为T细胞和B细胞功能严重受损，导致患者极易感染、生长发育迟缓，甚至在婴儿期死亡。骨髓移植（尤其是脐带血或外周血干细胞移植）是目前治疗SCID最有效的方法，尤其是对于基因缺陷明确且供体匹配良好的患者，移植后可重建正常的免疫功能。\n\n- **选项 A：性连锁无丙种球蛋白血症**  \n  性连锁无丙种球蛋白血症（X-linked agammaglobulinemia, XLA）是一种B细胞发育障碍的免疫缺陷病，主要由于腺苷脱氨酶（ADA）基因突变导致。虽然该病也可通过骨髓移植治疗，但其适应证相对较少，且多为替代疗法（如定期输注免疫球蛋白）为主，因此不是骨髓移植的最佳适应证。\n\n- **选项 C：DiGeorge综合征**  \n  DiGeorge综合征（22q11.2缺失综合征）主要表现为T细胞和B细胞功能缺陷，常伴有胸腺发育不全和免疫缺陷。该病的治疗包括免疫球蛋白替代治疗和胸腺移植，骨髓移植在该病中的应用较少，且多用于某些特殊病例，不是首选治疗方式。\n\n- **选项 D：选择性IgA缺陷**  \n  选择性IgA缺陷是一种以IgA缺乏为主、其他免疫功能正常的一种免疫缺陷病，通常表现为反复呼吸道和消化道感染，但一般不严重，多数患者可正常生活，无需骨髓移植治疗。\n\n- **选项 E：艾滋病**  \n  艾滋病（AIDS）是由HIV病毒引起的免疫系统功能逐渐丧失的疾病，其治疗主要依靠抗逆转录病毒治疗（ART），而非骨髓移植。骨髓移植在艾滋病中的应用极为有限，且多用于实验性治疗，不是常规治疗手段。\n\n**记忆技巧**：  \n“**SCID最有效，骨髓移植首选**”——“SCID”与“骨髓移植”在记忆中形成强关联，可帮助考生快速回忆该病的治疗方式。  \n另外，可联想“SCID”为“严重联合免疫缺陷”，而“骨髓移植”是“重建免疫系统”的关键手段。"

        "explanation": "</think>\n\n- **正确答案**：A  \n- **核心考点**：戈谢病的治疗原则与治疗方法。\n\n- **详细解析**：  \n  **A. 无治疗**：这是错误的。戈谢病是一种遗传性脂质代谢疾病，由葡萄糖脑苷脂酶缺乏引起，导致细胞内脂质沉积，影响多个器官系统。目前已有多种治疗方法，包括酶替代疗法（ERT）、底物减少疗法（SRT）以及脾切除等，因此“无治疗”是错误的。  \n\n  **B. 贫血时输红细胞**：这是正确的。戈谢病患者常因脾功能亢进、骨髓抑制或出血而出现贫血，输红细胞是常见的支持治疗措施。  \n\n  **C. 巨脾伴脾亢时可脾切除**：这是正确的。脾脏肿大并伴随脾功能亢进（脾亢）时，脾切除是治疗戈谢病的有效手段之一，尤其在酶替代疗法效果不佳时。  \n\n  **D. 酶替代疗法**：这是正确的。酶替代疗法（ERT）是戈谢病的主要治疗方法之一，通过静脉注射葡萄糖脑苷脂酶，帮助分解细胞内沉积的葡萄糖脑苷脂。  \n\n  **E. Ceredase注射**：这是正确的。Ceredase是酶替代疗法的一种制剂，属于葡萄糖脑苷脂酶的替代治疗药物，常用于戈谢病的治疗。  \n\n- **记忆技巧**：  \n  “戈谢病不无治疗，输红细胞、脾切除、酶替代都是治疗手段，Ceredase是酶替代药。”  \n  或者口诀记忆：**“戈谢病有治疗，输血脾切酶替代，Ceredase是药物。”**"

        "answer": "B",
        "explanation": "</think>\n\n**正确答案**：B  \n**核心考点**：先天性心脏病中，青紫出现最早的类型是完全性大动脉转位。  \n\n**详细解析**：  \n**B. 完全性大动脉转位**：这是先天性心脏病中最严重的类型之一，由于大动脉（主动脉和肺动脉）的位置互换，导致血液无法正常流动。这种情况下，氧合血和非氧合血混合，导致全身缺氧，因此出现青紫（发绀）最早、最明显。  \n\n**A. 室间隔缺损**：虽然室间隔缺损会导致左向右分流，但通常在出生后不久即可出现青紫，但一般不如完全性大动脉转位早。  \n\n**C. 肺动脉狭窄**：此病会导致右心负荷增加，但通常不会在出生早期出现明显的青紫，除非合并其他严重病变。  \n\n**D. 主动脉缩窄**：此病多为后天性或婴儿期发病，且主要影响上肢供血，青紫出现较晚，且不典型。  \n\n**E. 动脉导管未闭**：此病在出生后数周内可能出现青紫，但通常不如完全性大动脉转位早。  \n\n**记忆技巧**：  \n“**完全性大动脉转位**”可联想为“**大动脉位置颠倒**”，导致**血液无法正常输送氧气**，因此**最早出现青紫**。口诀：**“大动脉转位，青紫最早见”**。"

        "explanation": "</think>\n\n**正确答案**：E  \n**核心考点**：异性麻疹（也称作“非典型麻疹”或“再感染性麻疹”）是指曾经接种过麻疹减毒活疫苗后再次感染麻疹的情况，其临床表现与普通麻疹有所不同。\n\n**详细解析**：  \n- **E. 多见于接种过麻疹减毒活疫苗再次感染麻疹者**：  \n  异性麻疹是指个体在接种过麻疹减毒活疫苗后，再次感染麻疹病毒所引起的疾病。这类患者通常免疫反应较强，临床表现较轻，常表现为低热、咳嗽、结膜炎等，皮疹出现较晚，且症状较轻，因此称为“异性麻疹”。此选项正确。\n\n- **A. 没有接种过麻疹活疫苗**：  \n  错误。异性麻疹是接种过疫苗后再次感染，因此该选项描述的是未接种疫苗者，与异性麻疹无关。\n\n- **B. 多无发热及皮疹**：  \n  错误。虽然异性麻疹症状较轻，但仍可能有轻度发热和皮疹，只是程度较轻，而非“无”。\n\n- **C. 麻疹黏膜斑出现较晚**：  \n  错误。普通麻疹的黏膜斑（如Koplik斑）通常在发热1-2天后出现，而异性麻疹由于免疫反应较强，黏膜斑可能出现较早或较明显，因此该选项不准确。\n\n- **D. 皮疹从耳后及颈部开始，逐渐向躯干、四肢蔓延**：  \n  错误。这是普通麻疹的典型皮疹分布特征，而异性麻疹的皮疹通常较轻，且分布可能不典型，因此该选项不适用于异性麻疹。\n\n**记忆技巧**：  \n“异”即“再次”，“性”即“性质不同”，“麻疹”是疾病名称。可联想为：**“接种过疫苗的人再次感染麻疹，表现不同”**，即“异性麻疹”是“接种过疫苗者再次感染”的表现。  \n口诀：**“异麻再感，接种后又染，症状轻，皮疹晚”**。"

        "explanation": "</think>\n\n- **正确答案**：E  \n- **核心考点**：吉兰-巴雷综合征（GBS）的临床类型及预后差异。\n\n- **详细解析**：  \n  **E. AMAN型恢复较AIDP型缓慢**  \n  正确。吉兰-巴雷综合征主要分为两种类型：急性炎症性脱髓鞘性多发性神经根周围神经病（AIDP）和急性运动轴索性神经病（AMAN）。AMAN型主要表现为运动神经轴索的损伤，恢复过程通常较慢，而AIDP型以脱髓鞘为主，恢复相对较快。因此，E选项正确。\n\n  **A. 在吉兰-巴雷综合征中，Miller-Fisher综合征的预后最差**  \n  错误。Miller-Fisher综合征是GBS的一种亚型，通常预后较好，常表现为眼肌麻痹、共济失调和肌张力增高，但病情进展较慢，死亡率较低。因此，A选项错误。\n\n  **B. 大肠杆菌是吉兰-巴雷综合征最主要的前期感染病原**  \n  错误。虽然大肠杆菌（如O157:H7）是某些GBS病例的诱因，但并非“最主要的”前期感染病原。常见的诱因包括呼吸道感染、胃肠道感染（如沙门氏菌、腺病毒等），但没有明确证据表明大肠杆菌是“最主要”的病原。\n\n  **C. 吉兰-巴雷综合征系病原菌侵入并破坏周围神经纤维而发病**  \n  错误。GBS的发病机制主要是免疫介导的神经损伤，与病原菌直接侵入和破坏神经纤维无关。其机制涉及免疫系统对神经组织的异常反应，如自身免疫反应、细胞介导的损伤等，而非直接由细菌侵入引起。\n\n  **D. 吉兰-巴雷综合征不会同时出现脱髓鞘病变和轴索变性**  \n  错误。在某些GBS亚型中，如AIDP型，主要表现为脱髓鞘；而在AMAN型中，主要表现为轴索变性。但某些情况下，两种病变可能同时存在，尤其是病情较重或进展较快的病例中。因此，D选项不准确。\n\n- **记忆技巧**：  \n  “AMAN慢，AIDP快”——记住AMAN型恢复较慢，AIDP型恢复较快。  \n  或者：  \n  “Miller-Fisher眼肌麻痹，预后好”——帮助记忆Miller-Fisher综合征的临床表现和预后。"

        "explanation": "</think>\n\n**正确答案**：C  \n**核心考点**：CPAP治疗对二氧化碳潴留的影响。\n\n**详细解析**：  \n**C. 改善二氧化碳潴留**：这是错误的。CPAP（持续气道正压通气）主要用于治疗阻塞性睡眠呼吸暂停（OSA），其作用机制是通过维持气道开放，防止塌陷，从而改善通气和氧合。CPAP并不能显著改善二氧化碳潴留，因为其作用是通过增加气道压力来防止呼吸暂停，而不是直接改善肺部的通气/血流比例或肺泡通气量。对于慢性阻塞性肺疾病（COPD）患者，CPAP可能有助于减少二氧化碳潴留，但这一作用并非CPAP的主要适应症，且在某些情况下（如高碳酸血症）可能需要使用BiPAP（双水平气道正压通气）。\n\n**A. 改善缺氧**：正确。CPAP通过维持气道内正压，防止气道塌陷，从而改善通气，增加肺泡通气量，提高血氧饱和度，改善缺氧。\n\n**B. 提高功能残气量**：正确。CPAP通过维持气道内正压，有助于保持肺泡扩张，增加功能残气量，改善肺顺应性。\n\n**D. 降低呼吸功**：正确。CPAP通过维持气道开放，减少呼吸肌的做功，降低呼吸功，尤其在睡眠呼吸暂停患者中效果显著。\n\n**E. 改善肺不张**：正确。CPAP通过维持气道内正压，防止气道塌陷，有助于改善肺不张，特别是在睡眠呼吸暂停患者中。\n\n**记忆技巧**：  \n“CPAP不改善二氧化碳潴留，记住‘C’是错误选项，因为CPAP主要作用是改善通气，而不是直接处理二氧化碳潴留。”  \n或口诀：“CPAP不治CO2，只治缺氧和塌陷。”"

        "explanation": "</think>\n\n**正确答案**：B. 血友病B\n\n**核心考点**：本题考查血友病的实验室检查特征，特别是凝血因子活性的检测及血浆纠正试验的判断。\n\n**详细解析**：\n\n- **正确选项：B. 血友病B**  \n  血友病B（因子IX缺乏）是由于凝血因子IX的缺陷引起的出血性疾病。其典型实验室检查特征为：  \n  - **PT（凝血酶原时间）延长**：提示外源性凝血途径异常。  \n  - **KPTT（活化部分凝血活酶时间）正常**：提示内源性凝血途径功能正常。  \n  - **加入硫酸钡吸附血浆不能纠正**：说明因子IX的缺陷不是由于维生素K依赖的凝血因子（如因子II、V、VII、IX、X、XI、XIII）的缺乏，而是由于因子IX本身的缺陷。  \n  - **加入正常血清能纠正**：说明因子IX的缺乏是由于患者自身因子IX的不足，而非其他凝血因子的异常。  \n  因此，该患者符合血友病B的实验室特征。\n\n- **其他选项分析**：  \n  - **A. 血友病A**：因子VIII缺乏，其特点是KPTT延长，而PT正常。加入硫酸钡吸附血浆不能纠正，加入正常血清能纠正，但与血友病B的实验室表现不同，因此不符合。  \n  - **C. 血管性假性血友病**：主要由于血管性血友病因子（vWF）的异常，导致血小板功能障碍，常表现为出血倾向，但不涉及凝血因子的缺乏，实验室检查中PT、KPTT通常正常，不满足本题的检查结果。  \n  - **D. Ⅶ因子缺乏**：因子VII缺乏时，PT延长，KPTT正常，加入硫酸钡吸附血浆不能纠正，加入正常血清能纠正，但其临床表现和实验室特征与血友病B不同，且因子VII缺乏通常为先天性或获得性，不常见于无外伤史的患者。  \n  - **E. 十三因子缺乏**：因子XIII是凝血因子，主要参与纤维蛋白稳定，其缺乏通常表现为出血倾向，但PT、KPTT正常，且加入硫酸钡吸附血浆不能纠正，加入正常血清能纠正，但不符合血友病B的典型表现。\n\n**记忆技巧**：  \n“**血友病B，因子IX，硫酸钡不能纠正，血清能纠正，PT延长，KPTT正常**”——可简记为：“**B因子IX，硫酸不能，血清能，PT长，KPTT正**”。  \n或口诀：“**血友病B，因子IX，硫酸不能，血清能，PT延长，KPTT正常**”。"

function initQuiz() {
if (questions.length === 0) return;

currentQuestionIndex = 0;
answeredQuestions.clear();
mistakeQuestions.clear();
updateProgress();

document.getElementById('totalNum').textContent = questions.length;
document.getElementById('totalCount').textContent = questions.length;
document.getElementById('quizContainer').style.display = 'block';

if (randomMode) {
randomOrder = [...Array(questions.length).keys()];
shuffleArray(randomOrder);
currentOrder = randomOrder;
} else {
currentOrder = [...Array(questions.length).keys()];
}

showCurrentQuestion();
}

function shuffleArray(array) {
for (let i = array.length - 1; i > 0; i--) {
const j = Math.floor(Math.random() * (i + 1));
[array[i], array[j]] = [array[j], array[i]];
}
}

function showCurrentQuestion() {
const questionData = questions[currentOrder[currentQuestionIndex]];
const questionBox = document.getElementById('questionBox');
const optionsContainer = document.createElement('div');
optionsContainer.className = 'options';

questionBox.innerHTML = '';
questionBox.innerHTML += `<h4>题目 ${currentOrder[currentQuestionIndex] + 1}</h4>`;
questionBox.innerHTML += `<p>${questionData.question}</p>`;

Object.entries(questionData.options).forEach(([key, value]) => {
const optionDiv = document.createElement('div');
optionDiv.className = 'option';
optionDiv.innerHTML = `
<button class="option-btn" data-value="${key}">
${key}. ${value}
</button>
`;
optionsContainer.appendChild(optionDiv);
});
questionBox.appendChild(optionsContainer);

document.getElementById('currentNum').textContent = currentQuestionIndex + 1;
document.getElementById('resultMessage').classList.add('hidden');
document.getElementById('answerDisplay').classList.add('hidden');
document.getElementById('explanation').classList.add('hidden');

// 在背题模式下直接显示答案
if (memorizeMode) {
showAnswerInMemorizeMode();
}

updateNavigationButtons();
updateProgress();
updateStatusBar();
highlightSelectedOption();
}

function showAnswerInMemorizeMode() {
const questionData = questions[currentOrder[currentQuestionIndex]];
const answerDisplay = document.getElementById('answerDisplay');
const explanationDiv = document.getElementById('explanation');
const buttons = document.querySelectorAll('.option-btn');

// 显示正确答案
answerDisplay.innerHTML = `<strong>正确答案：</strong>${questionData.answer}. ${questionData.options[questionData.answer]}`;
answerDisplay.classList.remove('hidden');

// 显示解析
if (questionData.explanation) {
explanationDiv.innerHTML = `<strong>解析：</strong>${questionData.explanation}`;
explanationDiv.classList.remove('hidden');
}

// 高亮正确答案
buttons.forEach(btn => {
if (btn.dataset.value === questionData.answer) {
btn.classList.add('correct');
}
});
}

function highlightSelectedOption() {
const selectedAnswer = localStorage.getItem(`answer_${currentOrder[currentQuestionIndex]}`);
const buttons = document.querySelectorAll('.option-btn');
buttons.forEach(btn => {
btn.classList.remove('selected');
if (btn.dataset.value === selectedAnswer) {
btn.classList.add('selected');
}
});
}

function updateNavigationButtons() {
const prevBtn = document.getElementById('prevBtn');
const nextBtn = document.getElementById('nextBtn');
prevBtn.style.display = currentQuestionIndex > 0 ? 'inline-block' : 'none';
nextBtn.style.display = currentQuestionIndex < currentOrder.length - 1 ? 'inline-block' : 'none';
}

function updateProgress() {
const progress = ((currentQuestionIndex + 1) / currentOrder.length) * 100;
document.getElementById('progressFill').style.width = `${progress}%`;
document.getElementById('progressText').textContent = `${Math.round(progress)}% (${currentQuestionIndex + 1}/${currentOrder.length})`;
}

function updateStatusBar() {
document.getElementById('answeredCount').textContent = answeredQuestions.size;
document.getElementById('mistakeCount').textContent = mistakeQuestions.size;
}

document.getElementById('prevBtn').addEventListener('click', function() {
if (currentQuestionIndex > 0) {
currentQuestionIndex--;
showCurrentQuestion();
}
});

document.getElementById('nextBtn').addEventListener('click', function() {
if (currentQuestionIndex < currentOrder.length - 1) {
currentQuestionIndex++;
showCurrentQuestion();
}
});

document.addEventListener('click', function(e) {
if (e.target.classList.contains('option-btn')) {
if (!memorizeMode) {
// 练习模式：提交答案并检查
const selectedValue = e.target.dataset.value;
const correctAnswer = questions[currentOrder[currentQuestionIndex]].answer;

localStorage.setItem(`answer_${currentOrder[currentQuestionIndex]}`, selectedValue);
answeredQuestions.add(currentOrder[currentQuestionIndex]);

if (selectedValue !== correctAnswer) {
mistakeQuestions.add(currentOrder[currentQuestionIndex]);
} else {
mistakeQuestions.delete(currentOrder[currentQuestionIndex]);
}

e.target.classList.add('selected');
setTimeout(() => {
checkAnswer(selectedValue);
}, 300);
} else {
// 背题模式：仅高亮选项，不提交答案
const buttons = document.querySelectorAll('.option-btn');
buttons.forEach(btn => btn.classList.remove('selected'));
e.target.classList.add('selected');
}
}
});

function checkAnswer(selectedValue) {
const questionData = questions[currentOrder[currentQuestionIndex]];
const correctAnswer = questionData.answer;
const resultDiv = document.getElementById('resultMessage');
const answerDisplay = document.getElementById('answerDisplay');
const explanationDiv = document.getElementById('explanation');
const buttons = document.querySelectorAll('.option-btn');

buttons.forEach(btn => {
btn.disabled = true;
if (btn.dataset.value === correctAnswer) {
btn.classList.add('correct');
}
if (btn.dataset.value === selectedValue && selectedValue !== correctAnswer) {
btn.classList.add('incorrect');
}
});

if (selectedValue === correctAnswer) {
resultDiv.textContent = '✅ 正确！';
resultDiv.className = 'result correct';
} else {
resultDiv.textContent = `❌ 错误！正确答案是：${correctAnswer}`;
resultDiv.className = 'result wrong';
}

answerDisplay.innerHTML = `<strong>正确答案：</strong>${correctAnswer}. ${questionData.options[correctAnswer]}`;
answerDisplay.classList.remove('hidden');

if (questionData.explanation) {
explanationDiv.innerHTML = `<strong>解析：</strong>${questionData.explanation}`;
explanationDiv.classList.remove('hidden');
}

resultDiv.classList.remove('hidden');

if (currentQuestionIndex < currentOrder.length - 1) {
setTimeout(() => {
currentQuestionIndex++;
showCurrentQuestion();
}, 2000);
}
}

document.getElementById('showListsBtn').addEventListener('click', function() {
updateListModal();
document.getElementById('listsModal').style.display = 'block';
});

document.getElementById('randomBtn').addEventListener('click', function() {
randomMode = !randomMode;
this.classList.toggle('btn-warning', !randomMode);
this.classList.toggle('btn-success', randomMode);
this.textContent = randomMode ? '🎲 顺序练习' : '🎲 随机练习';
initQuiz();
});

document.getElementById('mistakePracticeBtn').addEventListener('click', function() {
if (mistakeQuestions.size === 0) {
alert('错题集为空！');
return;
}
currentOrder = Array.from(mistakeQuestions).sort((a, b) => a - b);
currentQuestionIndex = 0;
showCurrentQuestion();
});

document.getElementById('memorizeBtn').addEventListener('click', function() {
memorizeMode = !memorizeMode;
this.classList.toggle('btn-secondary', !memorizeMode);
this.classList.toggle('btn-success', memorizeMode);
this.textContent = memorizeMode ? '📖 退出背题' : '📖 背题模式';
const buttons = document.querySelectorAll('.option-btn');
buttons.forEach(btn => {
if (memorizeMode) {
btn.disabled = false; // 背题模式下不禁用按钮
} else {
btn.disabled = false; // 退出背题模式时也恢复
}
});
// 更新当前题目显示（显示或隐藏答案）
showCurrentQuestion();
});

document.querySelector('.close').addEventListener('click', function() {
document.getElementById('listsModal').style.display = 'none';
});

window.addEventListener('click', function(e) {
const modal = document.getElementById('listsModal');
if (e.target === modal) {
modal.style.display = 'none';
}
});

function updateListModal() {
const answeredItems = document.getElementById('answeredItems');
const mistakeItems = document.getElementById('mistakeItems');
const unansweredItems = document.getElementById('unansweredItems');

answeredItems.innerHTML = '';
mistakeItems.innerHTML = '';
unansweredItems.innerHTML = '';

const answeredArray = Array.from(answeredQuestions).sort((a, b) => a - b);
const mistakeArray = Array.from(mistakeQuestions).sort((a, b) => a - b);
const unansweredSet = new Set([...Array(questions.length).keys()].filter(x => !answeredQuestions.has(x)));
const unansweredArray = Array.from(unansweredSet).sort((a, b) => a - b);

answeredArray.forEach(index => {
const item = document.createElement('div');
item.className = 'list-item answered';
item.textContent = index + 1;
item.onclick = () => {
currentQuestionIndex = currentOrder.indexOf(index);
showCurrentQuestion();
document.getElementById('listsModal').style.display = 'none';
};
answeredItems.appendChild(item);
});

mistakeArray.forEach(index => {
const item = document.createElement('div');
item.className = 'list-item mistake';
item.textContent = index + 1;
item.onclick = () => {
currentQuestionIndex = currentOrder.indexOf(index);
showCurrentQuestion();
document.getElementById('listsModal').style.display = 'none';
};
mistakeItems.appendChild(item);
});

unansweredArray.forEach(index => {
const item = document.createElement('div');
item.className = 'list-item';
item.textContent = index + 1;
item.onclick = () => {
currentQuestionIndex = currentOrder.indexOf(index);
showCurrentQuestion();
document.getElementById('listsModal').style.display = 'none';
};
unansweredItems.appendChild(item);
});
}

document.getElementById('switchLibraryBtn').addEventListener('click', function() {
alert('此版本为单文件版，题库已内置，无法切换。');
});
