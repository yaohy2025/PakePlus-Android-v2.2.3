<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>姚怀阳刷题软件</title>
    <style>
        * {
            box-sizing: border-box;
        }
        
        body {
            font-family: "Microsoft YaHei", sans-serif;
            background-color: #f4f6f9;
            margin: 0;
            padding: 10px;
            color: #333;
            font-size: 14px;
            line-height: 1.4;
        }
        
        .container {
            max-width: 100%;
            margin: 0 auto;
            background: white;
            padding: 15px;
            border-radius: 8px;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
            display: flex;
            flex-direction: column;
        }
        
        .header {
            text-align: center;
            color: #2c3e50;
            margin-bottom: 15px;
        }
        
        .header h1 {
            font-size: 1.5em;
            margin: 0;
        }
        
        .main-content {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }
        
        .sidebar {
            width: 100%;
            background: #f8f9fa;
            border-radius: 5px;
            padding: 15px;
            display: flex;
            gap: 15px;
            flex-direction: column;
        }
        
        .question-section {
            flex: 1;
            min-height: 200px;
        }
        
        .mistake-section {
            flex: 1;
            min-height: 200px;
        }
        
        .section-title {
            margin-top: 0;
            font-size: 1.1em;
            color: #2c3e50;
            margin-bottom: 10px;
        }
        
        .question-list {
            list-style-type: none;
            padding: 0;
            margin: 0;
            display: grid;
            grid-template-columns: repeat(10, 1fr);
            gap: 8px;
            max-height: 200px;
            overflow-y: auto;
            padding-right: 8px;
        }
        
        .question-list::-webkit-scrollbar {
            width: 6px;
        }
        
        .question-list::-webkit-scrollbar-track {
            background: #f1f1f1;
            border-radius: 3px;
        }
        
        .question-list::-webkit-scrollbar-thumb {
            background: #ccc;
            border-radius: 3px;
        }
        
        .question-list::-webkit-scrollbar-thumb:hover {
            background: #aaa;
        }
        
        .question-item {
            padding: 8px;
            margin: 0;
            border-radius: 3px;
            cursor: pointer;
            transition: background-color 0.2s;
            font-size: 0.9em;
            text-align: center;
            min-width: 0;
        }
        
        .question-item:hover {
            background-color: #e9ecef;
        }
        
        .question-item.current {
            background-color: #3498db;
            color: white;
        }
        
        .question-item.answered-correct {
            background-color: #2ecc71;
            color: white;
        }
        
        .question-item.answered-wrong {
            background-color: #e74c3c;
            color: white;
        }
        
        .question-item.unanswered {
            background-color: #f39c12;
            color: white;
        }
        
        .quiz-main {
            flex: 1;
            display: flex;
            flex-direction: column;
        }
        
        .upload-area {
            text-align: center;
            padding: 20px;
            border: 2px dashed #3498db;
            border-radius: 10px;
            margin-bottom: 20px;
        }
        
        .upload-area:hover {
            border-color: #2980b9;
        }
        
        .btn {
            background-color: #3498db;
            color: white;
            padding: 10px 15px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-size: 14px;
            margin-right: 8px;
            min-height: 40px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
        }
        
        .btn:hover {
            background-color: #2980b9;
        }
        
        .btn:active {
            transform: scale(0.98);
        }
        
        .btn-secondary {
            background-color: #95a5a6;
        }
        
        .btn-success {
            background-color: #2ecc71;
        }
        
        .btn-warning {
            background-color: #f39c12;
        }
        
        .btn-danger {
            background-color: #e74c3c;
        }
        
        .quiz-container {
            display: none;
        }
        
        .question-info {
            margin-bottom: 15px;
            text-align: center;
        }
        
        .question-info h3 {
            font-size: 1.1em;
            margin: 0;
        }
        
        .question-box {
            margin-bottom: 15px;
            padding: 15px;
            border: 1px solid #eee;
            border-radius: 5px;
            background: #fdfdfd;
            flex: 1;
        }
        
        .question-box h4 {
            font-size: 1em;
            margin-top: 0;
            margin-bottom: 10px;
        }
        
        .question-box p {
            margin: 0 0 15px 0;
            word-wrap: break-word;
        }
        
        .options {
            margin-left: 0;
        }
        
        .option {
            margin: 8px 0;
        }
        
        .option-btn {
            display: block;
            width: 100%;
            padding: 12px;
            margin: 8px 0;
            border: 2px solid #ddd;
            border-radius: 8px;
            background-color: #fff;
            cursor: pointer;
            text-align: left;
            transition: all 0.2s ease;
            font-size: 14px;
            min-height: 44px;
            display: flex;
            align-items: center;
        }
        
        .option-btn:hover {
            border-color: #3498db;
            background-color: #f8f9fa;
        }
        
        .option-btn.selected {
            border-color: #3498db;
            background-color: #e1f0fa;
        }
        
        .option-btn.correct {
            border-color: #27ae60;
            background-color: #d4edda;
        }
        
        .option-btn.incorrect {
            border-color: #e74c3c;
            background-color: #f8d7da;
        }
        
        .result {
            font-weight: bold;
            margin-top: 10px;
            padding: 10px;
            border-radius: 5px;
            margin-bottom: 15px;
            text-align: center;
        }
        
        .correct {
            background-color: #d4edda;
            color: #155724;
        }
        
        .wrong {
            background-color: #f8d7da;
            color: #721c24;
        }
        
        .nav-buttons {
            text-align: center;
            margin-top: 15px;
        }
        
        .hidden {
            display: none;
        }
        
        .answer-display {
            background-color: #e8f4fd;
            padding: 12px;
            border-radius: 5px;
            margin-top: 15px;
            font-size: 0.9em;
        }
        
        .status-bar {
            background-color: #ecf0f1;
            padding: 10px;
            border-radius: 5px;
            margin-top: 15px;
            font-size: 0.9em;
            text-align: center;
        }
        
        .progress-container {
            margin-top: 15px;
        }
        
        .progress-bar {
            width: 100%;
            height: 15px;
            background-color: #e0e0e0;
            border-radius: 8px;
            overflow: hidden;
        }
        
        .progress-fill {
            height: 100%;
            background-color: #3498db;
            transition: width 0.3s ease;
        }
        
        .progress-text {
            text-align: right;
            margin-top: 5px;
            font-size: 12px;
            color: #666;
        }
        
        .mistake-panel {
            margin-top: 0;
            padding: 12px;
            background-color: #fff3cd;
            border: 1px solid #ffeaa7;
            border-radius: 5px;
            display: flex;
            flex-direction: column;
        }
        
        .mistake-panel h4 {
            margin-top: 0;
            font-size: 1em;
        }
        
        .mistake-controls {
            margin-bottom: 10px;
        }
        
        .mistake-controls .btn {
            padding: 8px 12px;
            font-size: 13px;
        }
        
        .mistake-list {
            list-style-type: none;
            padding: 0;
            margin: 0;
            display: grid;
            grid-template-columns: repeat(10, 1fr);
            gap: 8px;
            max-height: 200px;
            overflow-y: auto;
            padding-right: 8px;
        }
        
        .mistake-list::-webkit-scrollbar {
            width: 6px;
        }
        
        .mistake-list::-webkit-scrollbar-track {
            background: #f1f1f1;
            border-radius: 3px;
        }
        
        .mistake-list::-webkit-scrollbar-thumb {
            background: #ccc;
            border-radius: 3px;
        }
        
        .mistake-list::-webkit-scrollbar-thumb:hover {
            background: #aaa;
        }
        
        /* 移动端特定样式 */
        @media screen and (max-width: 768px) {
            body {
                padding: 5px;
            }
            
            .container {
                padding: 10px;
            }
            
            .upload-area {
                padding: 15px;
            }
            
            .btn {
                padding: 8px 12px;
                font-size: 13px;
                margin: 4px;
            }
            
            .nav-buttons .btn {
                min-width: 80px;
                padding: 10px 15px;
            }
            
            .sidebar {
                flex-direction: column;
            }
            
            .question-section, .mistake-section {
                flex: none;
            }
            
            .question-list, .mistake-list {
                grid-template-columns: repeat10, 1fr); /* 在小屏幕上显示3列 */
                max-height: 150px;
            }
            
            .question-box {
                padding: 12px;
            }
            
            .option-btn {
                padding: 10px;
                font-size: 13px;
            }
            
            .status-bar {
                font-size: 0.8em;
                padding: 8px;
            }
            
            .progress-text {
                font-size: 11px;
            }
        }
        
        @media screen and (max-width: 480px) {
            .question-list, .mistake-list {
                grid-template-columns: repeat(5, 1fr); /* 在更小的屏幕上显示2列 */
                max-height: 120px;
            }
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="header">
            <h1>📚 刷题</h1>
        </div>

        <!-- 文件上传区域 -->
        <div class="upload-area" id="uploadArea">
            <p>📁 点击下方按钮上传题库文件 (JSON格式)</p>
            <input type="file" id="jsonFile" accept=".json" style="width: 100%; padding: 8px;"/>
            <p style="margin-top: 15px; color: #7f8c8d; font-size: 0.9em;">注：请使用包含 questions 数组的 JSON 文件</p>
        </div>

        <!-- 主内容区 -->
        <div class="main-content">
            <!-- 题目列表侧栏 -->
            <div class="sidebar" id="sidebar" style="display: none;">
                <!-- 题目列表部分 -->
                <div class="question-section">
                    <h3 class="section-title">📋 题目列表</h3>
                    <ul class="question-list" id="questionList"></ul>
                </div>
                
                <!-- 错题集部分 -->
                <div class="mistake-section">
                    <h3 class="section-title">❌ 错题集</h3>
                    <div class="mistake-panel" id="mistakePanel">
                        <div class="mistake-controls">
                            <button class="btn btn-danger" id="clearMistakesBtn">🗑️ 清空错题</button>
                        </div>
                        <ul class="mistake-list" id="mistakeList"></ul>
                    </div>
                </div>
            </div>

            <!-- 刷题主内容 -->
            <div class="quiz-main">
                <!-- 刷题主界面 -->
                <div class="quiz-container" id="quizContainer">
                    <div class="question-info">
                        <h3>第 <span id="currentNum">1</span> 题 / 共 <span id="totalNum">0</span> 题</h3>
                    </div>

                    <div class="question-box" id="questionBox">
                        <!-- 题目将在这里动态生成 -->
                    </div>

                    <div id="resultMessage" class="result hidden"></div>
                    <div id="answerDisplay" class="answer-display hidden"></div>

                    <div class="nav-buttons">
                        <button class="btn btn-warning" id="prevBtn" style="display: none;">⬅️ 上一题</button>
                        <button class="btn btn-success" id="nextBtn" style="display: none;">➡️ 下一题</button>
                    </div>

                    <!-- 进度条容器 -->
                    <div class="progress-container">
                        <div class="progress-bar">
                            <div class="progress-fill" id="progressFill" style="width: 0%;"></div>
                        </div>
                        <div class="progress-text" id="progressText">0% (0/0)</div>
                    </div>

                    <div class="status-bar" id="statusBar">
                        已答: <span id="answeredCount">0</span> / <span id="totalCount">0</span> 题 | 
                        错题: <span id="mistakeCount">0</span> 题
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        // 全局变量
        let questions = [];
        let currentIdx = 0;
        let answeredStatus = []; // 记录每道题是否已回答 [null, 'correct', 'wrong']
        let userAnswer = null; // 记录当前题用户的选择
        let mistakeQuestions = []; // 存储错题索引
        let mistakeCounts = []; // 记录每道题的错误次数

        const jsonInput = document.getElementById('jsonFile');
        const uploadArea = document.getElementById('uploadArea');
        const quizContainer = document.getElementById('quizContainer');
        const sidebar = document.getElementById('sidebar');
        const questionBox = document.getElementById('questionBox');
        const nextBtn = document.getElementById('nextBtn');
        const prevBtn = document.getElementById('prevBtn');
        const currentNumSpan = document.getElementById('currentNum');
        const totalNumSpan = document.getElementById('totalNum');
        const resultMessage = document.getElementById('resultMessage');
        const answerDisplay = document.getElementById('answerDisplay');
        const questionList = document.getElementById('questionList');
        const answeredCountSpan = document.getElementById('answeredCount');
        const totalCountSpan = document.getElementById('totalCount');
        const progressFill = document.getElementById('progressFill');
        const progressText = document.getElementById('progressText');
        const statusBar = document.getElementById('statusBar');
        const mistakePanel = document.getElementById('mistakePanel');
        const mistakeList = document.getElementById('mistakeList');
        const clearMistakesBtn = document.getElementById('clearMistakesBtn');
        const mistakeCountSpan = document.getElementById('mistakeCount');

        // 监听文件选择
        jsonInput.addEventListener('change', function(e) {
            const file = e.target.files[0];
            if (!file) return;

            const reader = new FileReader();
            reader.onload = function(event) {
                try {
                    // 解析 JSON
                    const parsedData = JSON.parse(event.target.result);
                    
                    // 提取题目数组 (兼容你上传的数据格式)
                    if (Array.isArray(parsedData)) {
                        questions = parsedData;
                    } else if (Array.isArray(parsedData.questions)) {
                        questions = parsedData.questions;
                    } else {
                        throw new Error("JSON格式不正确，应包含一个题目数组");
                    }

                    // 验证数据
                    if (questions.length === 0) {
                        throw new Error("未找到题目数据");
                    }

                    // 初始化状态数组
                    answeredStatus = new Array(questions.length).fill(null);
                    mistakeCounts = new Array(questions.length).fill(0); // 初始化错误次数为0

                    // 初始化界面
                    totalNumSpan.textContent = questions.length;
                    totalCountSpan.textContent = questions.length;
                    updateStatusBar();
                    updateProgress(); // 初始化进度条

                    // 渲染题目列表
                    renderQuestionList();

                    // 加载第一题
                    loadQuestion(currentIdx);

                    // 切换显示
                    uploadArea.style.display = 'none';
                    sidebar.style.display = 'flex';
                    quizContainer.style.display = 'block';

                } catch (error) {
                    alert("加载失败: " + error.message);
                    console.error(error);
                }
            };
            reader.readAsText(file);
        });

        // 渲染题目列表
        function renderQuestionList() {
            questionList.innerHTML = '';
            questions.forEach((q, index) => {
                const li = document.createElement('li');
                let statusClass = 'unanswered';
                if (answeredStatus[index] === 'correct') statusClass = 'answered-correct';
                if (answeredStatus[index] === 'wrong') statusClass = 'answered-wrong';
                
                li.className = `question-item ${index === currentIdx ? 'current' : ''} ${statusClass}`;
                li.textContent = `第 ${index + 1} 题`;
                li.onclick = () => {
                    currentIdx = index;
                    loadQuestion(currentIdx);
                };
                questionList.appendChild(li);
            });
        }

        // 更新题目列表中的当前题目高亮和状态
        function updateQuestionListHighlight() {
            const items = questionList.querySelectorAll('.question-item');
            items.forEach((item, index) => {
                item.classList.remove('current', 'answered-correct', 'answered-wrong', 'unanswered');
                
                let statusClass = 'unanswered';
                if (answeredStatus[index] === 'correct') statusClass = 'answered-correct';
                if (answeredStatus[index] === 'wrong') statusClass = 'answered-wrong';
                
                item.classList.add(statusClass);
                if (index === currentIdx) item.classList.add('current');
            });
        }

        // 更新错题列表
        function renderMistakeList() {
            mistakeList.innerHTML = '';
            if (mistakeQuestions.length === 0) {
                mistakeList.innerHTML = '<li style="color: #666; font-style: italic; grid-column: span 5;">暂无错题</li>';
                return;
            }

            mistakeQuestions.forEach(mistakeIndex => {
                const q = questions[mistakeIndex];
                const li = document.createElement('li');
                li.className = 'question-item';
                li.textContent = `第 ${mistakeIndex + 1} 题 (${mistakeCounts[mistakeIndex]}次)`;
                li.onclick = () => {
                    currentIdx = mistakeIndex;
                    loadQuestion(currentIdx);
                };
                mistakeList.appendChild(li);
            });
        }

        // 更新状态栏
        function updateStatusBar() {
            const answered = answeredStatus.filter(s => s !== null).length;
            const mistakes = mistakeQuestions.length;
            answeredCountSpan.textContent = answered;
            mistakeCountSpan.textContent = mistakes;
        }

        // 更新进度条
        function updateProgress() {
            const total = questions.length;
            const answered = answeredStatus.filter(s => s !== null).length;
            const percentage = total > 0 ? Math.round((answered / total) * 100) : 0;
            
            progressFill.style.width = `${percentage}%`;
            progressText.textContent = `${percentage}% (${answered}/${total})`;
        }

        // 加载题目
        function loadQuestion(index) {
            const q = questions[index];
            currentNumSpan.textContent = index + 1;

            // 清除旧的状态
            resultMessage.classList.add('hidden');
            answerDisplay.classList.add('hidden');
            userAnswer = null;

            let optionsHtml = '';
            for (let key in q.options) {
                optionsHtml += `
                    <div class="option">
                        <button class="option-btn" data-value="${key}">
                            <strong>${key}:</strong> ${q.options[key]}
                        </button>
                    </div>
                `;
            }

            questionBox.innerHTML = `
                <h4>题目 ${q.id || (index + 1)}:</h4>
                <p>${q.question}</p>
                <div class="options">
                    ${optionsHtml}
                </div>
            `;

            // 为每个选项按钮绑定点击事件
            const optionButtons = questionBox.querySelectorAll('.option-btn');
            optionButtons.forEach(button => {
                button.onclick = function() {
                    if (userAnswer !== null) return; // 防止重复点击

                    userAnswer = this.getAttribute('data-value');
                    // 高亮选中的按钮
                    optionButtons.forEach(btn => btn.classList.remove('selected'));
                    this.classList.add('selected');

                    // 自动检查答案
                    checkAnswer();
                };
            });

            // 重置按钮状态
            nextBtn.style.display = 'none';
            prevBtn.style.display = 'none';
            if (index > 0) prevBtn.style.display = 'inline-block';
            if (index < questions.length - 1) nextBtn.style.display = 'inline-block';
            
            // 更新列表高亮
            updateQuestionListHighlight();
        }

        // 检查答案
        function checkAnswer() {
            if (!userAnswer) return; // 如果没有选择，不执行

            const correctAnswer = questions[currentIdx].answer;
            const optionButtons = questionBox.querySelectorAll('.option-btn');
            
            // 找到用户选择和正确答案对应的按钮
            const selectedButton = Array.from(optionButtons).find(btn => btn.getAttribute('data-value') === userAnswer);
            const correctButton = Array.from(optionButtons).find(btn => btn.getAttribute('data-value') === correctAnswer);

            // 设置按钮状态
            if (userAnswer === correctAnswer) {
                selectedButton.classList.add('correct');
                resultMessage.textContent = "恭喜！回答正确。";
                resultMessage.className = "result correct";
                // 标记为回答正确
                answeredStatus[currentIdx] = 'correct';
            } else {
                selectedButton.classList.add('incorrect');
                correctButton.classList.add('correct');
                resultMessage.textContent = `回答错误。你的答案: ${userAnswer} | 正确答案: ${correctAnswer}`;
                resultMessage.className = "result wrong";
                // 标记为回答错误
                answeredStatus[currentIdx] = 'wrong';
                
                // 添加到错题集（如果尚未加入）
                if (!mistakeQuestions.includes(currentIdx)) {
                    mistakeQuestions.push(currentIdx);
                    renderMistakeList(); // 更新错题列表
                }
                // 增加错误次数
                mistakeCounts[currentIdx]++;
            }

            // 更新状态栏和进度条
            updateStatusBar();
            updateProgress();
            updateQuestionListHighlight();
            
            // 始终显示下一题按钮（即使在最后一题）
            nextBtn.style.display = 'inline-block';
        }

        // 下一题
        function goToNext() {
            if (currentIdx < questions.length - 1) {
                currentIdx++;
                loadQuestion(currentIdx);
            }
        }

        // 上一题
        function goToPrev() {
            if (currentIdx > 0) {
                currentIdx--;
                loadQuestion(currentIdx);
            }
        }

        // 清空错题集
        function clearMistakes() {
            if (confirm("确定要清空所有错题吗？")) {
                mistakeQuestions = [];
                // 重置所有题目的错误标记，但保留正确/错误状态
                mistakeCounts.fill(0);
                renderMistakeList();
                updateStatusBar();
            }
        }

        // 为导航按钮添加事件监听器
        nextBtn.addEventListener('click', goToNext);
        prevBtn.addEventListener('click', goToPrev);
        clearMistakesBtn.addEventListener('click', clearMistakes);
        
        // 显示错题集面板
        mistakePanel.style.display = 'block';
    </script>
</body>
</html>
